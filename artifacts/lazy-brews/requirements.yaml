  - path: "artifacts/lazy-brews/public/images/bottle-hazelnut.png"
    description: "A premium, sleek glass bottle of cold brew coffee concentrate. The label is minimal, elegant sky blue, beige, and subtle warm hazelnut brown accents. It sits isolated on a clean, soft beige pedestal with studio lighting, photorealistic."
    aspect_ratio: "3:4"
  - path: "artifacts/lazy-brews/public/images/bottle-vanilla.png"
