  - path: "artifacts/lazy-brews/public/images/bottle-classic.png"
    description: "A premium, sleek glass bottle of cold brew coffee concentrate. The label is minimal, elegant sky blue and warm beige. It sits isolated on a clean, soft beige pedestal with studio lighting, photorealistic."
