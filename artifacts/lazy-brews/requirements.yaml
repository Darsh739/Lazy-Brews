packages:
  "framer-motion": "For smooth scroll animations and premium page transitions"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"
  "@radix-ui/react-slot": "For accessible composable components"

images:
